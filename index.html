<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Whack-A-Mole</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div class="main">
      <div class="buttons">
        <button id="timer" class="btn greenBtn">START!</button>
        <button class="redBtn btn" id="rules">RULES</button>
      </div>

      <div class="title">
        <h1>WHACK - A - MOLE!</h1>
        <button id="score" class="score">0</button>
      </div>

      <div class="players">
        <div class="player">
          <img src="assets/SVG's/mole.svg" alt="mole" class="mole" />
          <img src="assets/SVG's/dirt.svg" alt="dirt" class="dirt" />
        </div>
        <div class="player">
          <img src="assets/SVG's/mole.svg" alt="mole" class="mole" />
          <img src="assets/SVG's/dirt.svg" alt="dirt" class="dirt" />
        </div>
        <div class="player">
          <img src="assets/SVG's/mole.svg" alt="mole" class="mole" />
          <img src="assets/SVG's/dirt.svg" alt="dirt" class="dirt" />
        </div>
        <div class="player">
          <img src="assets/SVG's/mole.svg" alt="mole" class="mole" />
          <img src="assets/SVG's/dirt.svg" alt="dirt" class="dirt" />
        </div>
        <div class="player">
          <img src="assets/SVG's/mole.svg" alt="mole" class="mole" />
          <img src="assets/SVG's/dirt.svg" alt="dirt" class="dirt" />
        </div>
        <div class="player">
          <img src="assets/SVG's/mole.svg" alt="mole" class="mole" />
          <img src="assets/SVG's/dirt.svg" alt="dirt" class="dirt" />
        </div>
      </div>
    </div>

    <!-- Footer -->

    <div class="footer">
      <div class="visit">
        <p>Visit the</p>
        <a href="https://github.com/areebamoosa/Whack-a-Mole"
          >Whack-A-Mole Repo.</a
        >
      </div>

      <div class="cred">
        <p>Made with</p>
        <span> <i class="fa-regular fa-heart"></i></span>
        <p>by A.M</p>
      </div>

      <div class="emojis">
        <a href="https://github.com/areebamoosa">
          <i class="fa-brands fa-github"></i
        ></a>
        <a href="mailto:areebamoosa.am@gmail.com">
          <i class="fa-regular fa-envelope"></i>
        </a>
        <a href="https://www.linkedin.com/in/areebamoosa/">
          <i class="fa-brands fa-linkedin"></i>
        </a>
      </div>
    </div>

    <!-- Rules Pop Up Box -->

    <div class="popup">
      <div class="content">
        <div class="x">
          <i class="fa-solid fa-x close-popup"></i>
        </div>

        <div>
          <h2 class="popTitle">RULES</h2>
        </div>

        <div class="textcontent">
          <div class="text">
            <span class="yellow">How to play:</span>
            <p>Click on the moles to score points!</p>
          </div>

          <div class="text">
            <span class="yellow">Scoring System:</span>
            <p>
              Each mole hit earns you 1 point. Missing moles will deduct 1
              point!
            </p>
          </div>

          <div class="text">
            <span class="yellow">Time Limit:</span>
            <p>Each gameplay lasts for 30 seconds!</p>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
